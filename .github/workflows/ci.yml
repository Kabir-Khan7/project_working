name: CI — Neural Ledger Backend

on:
  push:
    branches: [main, dev]
    paths:
      - "roohullah/neural-ledger-backend/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "roohullah/neural-ledger-backend/**"

jobs:
  # ── Lint + format check ─────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: roohullah/neural-ledger-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff==0.8.0

      - name: Ruff lint
        run: ruff check app/

      - name: Ruff format check
        run: ruff format --check app/

  # ── Unit tests ──────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: roohullah/neural-ledger-backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: neural_ledger_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/neural_ledger_test
      JWT_SECRET_KEY: test-jwt-secret-key-for-ci-only
      MASTER_ENCRYPTION_KEY: test-aes-master-key-for-ci-only
      ENVIRONMENT: test
      DEBUG: "False"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest -v --tb=short

  # ── Docker build sanity check ───────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: roohullah/neural-ledger-backend
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t neural-ledger-backend:ci .
